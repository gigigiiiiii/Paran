# ============================================================
# botsort_reid_config.yaml — BoT-SORT + Re-ID 활성화
# ============================================================

tracker_type: botsort

# ── 1차 매칭 (고신뢰 탐지) ──────────────────────────────────────────
track_high_thresh: 0.30

# ── 2차 매칭 (저신뢰 탐지 복원) ─────────────────────────────────────
track_low_thresh: 0.10

# ── 신규 track 초기화 임계값 ────────────────────────────────────────
new_track_thresh: 0.30

# ── 버퍼 (track 보존 기간) ──────────────────────────────────────────
# 30fps 기준 120 = 4초, 15fps 기준 = 8초
track_buffer: 120

# ── IoU 매칭 임계값 ─────────────────────────────────────────────────
match_thresh: 0.6

# ── 위치 근접 임계값 (BoT-SORT 전용) ────────────────────────────────
proximity_thresh: 0.5

# ── Re-ID 외형 유사도 임계값 ────────────────────────────────────────
# 낮을수록 같은 사람으로 인식하기 쉬움 (너무 낮으면 오매칭)
appearance_thresh: 0.25

# ── Re-ID 활성화 ────────────────────────────────────────────────────
with_reid: true

# ── Re-ID 모델 ──────────────────────────────────────────────────────
# auto: 별도 모델 없이 YOLO 내장 특징값 사용
model: auto

# ── 카메라 움직임 보정 (고정 카메라이므로 none) ──────────────────────
gmc_method: none

# ── 점수 융합 ───────────────────────────────────────────────────────
fuse_score: true
