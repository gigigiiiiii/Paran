# ============================================================
# bytetrack_config.yaml — 공장 CCTV 최적화
# ============================================================
# 저FPS(15fps), 원거리 소형 객체, 고정 카메라 환경에 맞게 튜닝.
# ============================================================

tracker_type: bytetrack

# ── 1차 매칭 (고신뢰 탐지) ──────────────────────────────────────────
# 원거리 소형 객체는 confidence가 낮게 나오므로 0.35로 낮춤
track_high_thresh: 0.35

# ── 2차 매칭 (저신뢰 탐지 복원) ─────────────────────────────────────
# 가려진 객체 복원용. 너무 낮추면 노이즈 포함됨
track_low_thresh: 0.1

# ── 신규 track 초기화 임계값 ────────────────────────────────────────
# 낮출수록 새 ID 생성이 쉬워짐 (소형 객체 포착 ↑, ID 과다 생성 주의)
new_track_thresh: 0.35

# ── 버퍼 (track 보존 기간) ──────────────────────────────────────────
# 15fps 기준 60 = 약 4초 동안 가려져도 같은 ID 유지
# 저FPS 영상에서 프레임 간 누락이 잦으므로 넉넉히 설정
track_buffer: 120

# ── IoU 매칭 임계값 ─────────────────────────────────────────────────
# 저FPS 영상에서 프레임 간 이동량이 커도 매칭되도록 낮춤
match_thresh: 0.6

# ── 점수 융합 ───────────────────────────────────────────────────────
fuse_score: True
